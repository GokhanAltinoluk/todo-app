<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NEXUS</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00e5ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NEXUS" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH -->
  <div class="auth-wrap" id="authWrap">
    <div class="auth-card">
      <div class="auth-logo">⬡</div>
      <h1 class="auth-title">NEXUS</h1>
      <p class="auth-subtitle">Görev & Finans Yönetimi</p>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Giriş Yap</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Kayıt Ol</button>
      </div>
      <form class="auth-form" id="loginForm">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="loginEmail" placeholder="ornek@email.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Giriş Yap</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>
      <form class="auth-form hidden" id="registerForm">
        <div class="field">
          <label>E-posta</label>
          <input type="email" id="regEmail" placeholder="ornek@email.com" required autocomplete="email" />
        </div>
        <div class="field">
          <label>Şifre <span class="hint">(en az 6 karakter)</span></label>
          <input type="password" id="regPassword" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">Kayıt Ol</button>
        <p class="auth-msg" id="registerMsg"></p>
      </form>
    </div>
  </div>

  <div class="banner hidden" id="confirmedBanner">
    E-posta adresin doğrulandı! Şimdi giriş yapabilirsin.
  </div>

  <!-- APP -->
  <div class="app-wrap hidden" id="appWrap">

    <div class="topbar">
      <span class="topbar-logo">⬡ NEXUS</span>
      <div class="topbar-right">
        <button class="icon-btn" id="notifBtn" title="Bildirimlere izin ver">🔔</button>
        <button class="icon-btn" id="themeBtn" title="Tema değiştir">☀</button>
        <span id="userEmail"></span>
        <button id="logoutBtn">Çıkış</button>
      </div>
    </div>

    <div class="panels">

      <!-- GÖREVLER -->
      <div class="panel" id="todoPanel">
        <div class="panel-header">
          <h2 class="panel-title">Görevler</h2>
        </div>

        <form class="input-row" id="todoForm">
          <input type="text" id="todoInput" placeholder="Yeni görev ekle..." autocomplete="off" />
          <button type="submit">Ekle</button>
        </form>

        <button class="extra-toggle" id="todoExtraToggle">+ Seçenekler</button>
        <div class="todo-extra" id="todoExtra">
          <div class="extra-field">
            <label>Son tarih</label>
            <input type="datetime-local" id="todoDueDate" />
          </div>
          <div class="extra-field">
            <label>Tekrar</label>
            <select id="todoRepeat">
              <option value="none">Tekrar yok</option>
              <option value="daily">Her gün</option>
              <option value="weekly">Her hafta</option>
              <option value="monthly">Her ay</option>
            </select>
          </div>
        </div>

        <div class="filters">
          <button class="filter-btn active" data-filter="all">Tümü</button>
          <button class="filter-btn" data-filter="active">Aktif</button>
          <button class="filter-btn" data-filter="completed">Tamamlanan</button>
        </div>

        <ul id="todoList"></ul>

        <div class="footer">
          <span id="remaining"></span>
          <button id="clearCompleted">Tamamlananları sil</button>
        </div>
      </div>

      <!-- GELİR/GİDER -->
      <div class="panel" id="financePanel">
        <div class="panel-header">
          <h2 class="panel-title">Gelir / Gider</h2>
        </div>

        <div class="finance-summary">
          <div class="summary-card gelir-card">
            <span class="summary-label">Toplam Gelir</span>
            <span class="summary-amount pozitif" id="totalGelir">0,00 ₺</span>
          </div>
          <div class="summary-card gider-card">
            <span class="summary-label">Toplam Gider</span>
            <span class="summary-amount negatif" id="totalGider">0,00 ₺</span>
          </div>
          <div class="summary-card net-card">
            <span class="summary-label">Net Bakiye</span>
            <span class="summary-amount" id="netBakiye">0,00 ₺</span>
          </div>
        </div>

        <!-- Aylık Hedefler -->
        <div class="budget-section">
          <div class="budget-header">
            <span class="budget-title">Aylık Hedefler</span>
            <button class="budget-edit-btn" id="editBudgetBtn">Düzenle</button>
          </div>
          <div class="budget-row">
            <span class="budget-label">Gelir Hedefi</span>
            <div class="progress-bar"><div class="progress-fill gelir-fill" id="gelirProgress"></div></div>
            <span class="budget-val" id="gelirPct">—</span>
          </div>
          <div class="budget-row">
            <span class="budget-label">Gider Limiti</span>
            <div class="progress-bar"><div class="progress-fill gider-fill" id="giderProgress"></div></div>
            <span class="budget-val" id="giderPct">—</span>
          </div>
          <div class="budget-form hidden" id="budgetForm">
            <input type="number" id="gelirHedef" placeholder="Gelir hedefi (₺)" min="0" step="100" />
            <input type="number" id="giderLimit" placeholder="Gider limiti (₺)" min="0" step="100" />
            <button type="button" id="saveBudgetBtn">Kaydet</button>
          </div>
        </div>

        <form class="transaction-form" id="transactionForm">
          <div class="type-toggle">
            <button type="button" class="type-btn active" data-type="gelir">+ Gelir</button>
            <button type="button" class="type-btn" data-type="gider">− Gider</button>
          </div>
          <div class="trans-inputs">
            <input type="text" id="transDesc" placeholder="Açıklama..." autocomplete="off" />
            <input type="number" id="transAmount" placeholder="Tutar (₺)" min="0.01" step="0.01" />
            <button type="submit">Ekle</button>
          </div>
        </form>

        <ul id="transactionList"></ul>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: '/todo-app/' });
    }
  </script>
</body>
</html>
